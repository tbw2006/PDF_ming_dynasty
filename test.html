<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试页面</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Noto Serif SC", "SimSun", serif;
    background: linear-gradient(135deg, #2d1b0e 0%, #4a2c17 40%, #6b3a2a 100%);
    color: #f5e6d0;
  }
  .card {
    background: rgba(255,255,255,0.08);

    border-radius: 12px;
    padding: 40px 32px;
    text-align: center;
    max-width: 360px;
  }
  h1 { margin: 0 0 8px; font-size: 1.6em; }
  p { margin: 0; opacity: 0.7; }
  .status { color: #7ec87e; margin-top: 16px; }

</head>
<body>
<div class="card">
  <h1>中华衣冠奇遇记</h1>
  <p>测试页面</p>
  <p class="status">如果你能看到这页，HTTP 服务正常运行 ✓</p>
